<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoofQuote AI | Portal Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 160px);
            padding: 2rem;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .login-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .login-title {
            font-family: var(--font-heading);
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2.5rem;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 0.6rem 1rem;
            color: #f87171;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: left;
            display: none;
        }
        .login-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }
        .login-input-group label {
            font-size: 0.85rem;
            font-weight: 550;
        }
        .btn-login {
            width: 100%;
        }
        .back-to-home {
            margin-top: 2rem;
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition-smooth);
        }
        .back-to-home:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-layout">
        <div class="card glass-card login-card">
            <div class="login-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;">
                    <path d="m2 22 1-1h3l9-9 3 3-9 9H3l-1-1Z"/>
                    <path d="M14 6.5 17.5 10"/>
                    <path d="m16 2 6 6"/>
                </svg>
                <span class="logo-text" style="font-size: 1.75rem;">RoofQuote <span class="accent-text">AI</span></span>
            </div>

            <h2 class="login-title">Control Center Access</h2>
            <p class="login-subtitle">Please enter your password to manage active leads and settings.</p>

            <div class="error-message" id="login-error"></div>

            <form id="login-form">
                <div class="login-input-group">
                    <label for="password">Administrator Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autofocus style="background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-light); border-radius: 8px; padding: 0.75rem 1rem; color: white;">
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    Sign In Securely
                    <svg class="icon-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
                </button>
            </form>

            <a href="/" class="back-to-home">← Back to Customer Quote Portal</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Redirect to the protected dashboard page upon authentication
                    window.location.href = '/admin.html';
                } else {
                    errorDiv.textContent = result.error || 'Authentication failed.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Server connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
